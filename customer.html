<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="description" content="RideSphere 顧客アプリ" />
    <link rel="manifest" href="customer.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
    <title>RideSphere | 顧客アプリ</title>
  </head>
  <body>
    <header class="app-header customer-top">
      <div>
        <p class="eyebrow">Customer app</p>
        <h1>顧客アプリ</h1>
      </div>
      <div class="header-actions">
        <a class="nav-link" href="index.html">アプリ選択</a>
        <button id="notifyButton" class="ghost">通知を有効化</button>
      </div>
    </header>

    <main class="layout customer-layout">
      <section class="panel" aria-labelledby="customerTitle">
        <div class="section-heading"><p class="eyebrow">Customer login</p><h2 id="customerTitle">顧客選択</h2></div>
        <label class="field"><span>ログイン中の顧客</span><select id="customerSelect"></select></label>
        <p class="hint">顧客専用アプリです。管理者の配車操作・ドライバー承認操作は表示しません。</p>
      </section>

      <section class="panel" aria-labelledby="requestTitle">
        <div class="section-heading row">
          <div><p class="eyebrow">Ride request</p><h2 id="requestTitle">予約・緊急依頼</h2></div>
          <span class="badge">顧客専用</span>
        </div>
        <form id="requestForm" class="form-grid">
          <label class="field"><span>乗車場所</span><select id="pickupSelect" name="pickupSelect"></select></label>
          <label class="field"><span>目的地</span><select id="destinationSelect" name="destinationSelect"></select></label>
          <label class="field"><span>希望日時</span><input id="reservationTime" name="reservationTime" type="datetime-local" required /></label>
          <button class="primary" type="submit">依頼を送信</button>
        </form>
      </section>

      <section class="panel map-panel" aria-labelledby="mapTitle">
        <div class="section-heading row">
          <div><p class="eyebrow">Ride status</p><h2 id="mapTitle">予約状況・乗車場所</h2></div>
          <button id="shareLocationButton" class="primary">現在地共有</button>
        </div>
        <div class="map-shell">
          <div id="mapCanvas" class="map-canvas" role="img" aria-label="顧客用予約地図"></div>
          <aside class="map-legend" aria-label="地図凡例">
            <span><i class="dot driver"></i>ドライバー</span>
            <span><i class="dot pickup"></i>乗車場所</span>
            <span><i class="dot destination"></i>目的地</span>
          </aside>
        </div>
      </section>

      <section class="panel" aria-labelledby="statusTitle">
        <div class="section-heading row"><div><p class="eyebrow">Status</p><h2 id="statusTitle">自分の予約</h2></div><button id="emergencyButton" class="danger">緊急通知</button></div>
        <div id="statusList" class="card-list"></div>
      </section>

      <section class="panel" aria-labelledby="notificationsTitle">
        <div class="section-heading"><p class="eyebrow">Customer log</p><h2 id="notificationsTitle">通知・履歴</h2></div>
        <ol id="eventLog" class="event-log" aria-live="polite"></ol>
      </section>
    </main>
    <script src="customer.js" type="module"></script>
  </body>
</html>
