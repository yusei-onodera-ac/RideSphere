<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="description" content="RideSphere 管理者アプリ" />
    <link rel="manifest" href="admin.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
    <title>RideSphere | 管理者アプリ</title>
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Admin app</p>
        <h1>管理者アプリ</h1>
      </div>
      <div class="header-actions">
        <a class="nav-link" href="index.html">アプリ選択</a>
        <button id="notifyButton" class="ghost">通知を有効化</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel map-panel" aria-labelledby="mapTitle">
        <div class="section-heading row">
          <div>
            <p class="eyebrow">Live map</p>
            <h2 id="mapTitle">現在地・予約・空きドライバー</h2>
          </div>
          <div class="map-tools">
            <button id="shareLocationButton" class="primary">管理者の現在地更新</button>
            <button id="refreshDriversButton" class="ghost">空きドライバー検索</button>
          </div>
        </div>
        <div class="map-shell">
          <div id="mapCanvas" class="map-canvas" role="img" aria-label="配車地図"></div>
          <aside class="map-legend" aria-label="地図凡例">
            <span><i class="dot admin"></i>管理者</span>
            <span><i class="dot driver"></i>空きドライバー</span>
            <span><i class="dot busy"></i>対応中</span>
            <span><i class="dot pickup"></i>乗車場所</span>
            <span><i class="dot destination"></i>目的地</span>
          </aside>
        </div>
      </section>

      <section class="panel" aria-labelledby="reservationTitle">
        <div class="section-heading row">
          <div>
            <p class="eyebrow">Reservation</p>
            <h2 id="reservationTitle">予約登録</h2>
          </div>
          <span class="badge">管理者専用</span>
        </div>
        <form id="reservationForm" class="form-grid">
          <label class="field"><span>顧客名</span><input id="customerName" name="customerName" required placeholder="例: 佐藤 花子" /></label>
          <label class="field"><span>乗車場所</span><select id="pickupSelect" name="pickupSelect"></select></label>
          <label class="field"><span>目的地</span><select id="destinationSelect" name="destinationSelect"></select></label>
          <label class="field"><span>予約日時</span><input id="reservationTime" name="reservationTime" type="datetime-local" required /></label>
          <button class="primary" type="submit">予約を登録</button>
        </form>
      </section>

      <section class="panel" aria-labelledby="dispatchTitle">
        <div class="section-heading"><p class="eyebrow">Dispatch</p><h2 id="dispatchTitle">予約一覧・配車割当</h2></div>
        <div id="reservationList" class="card-list"></div>
      </section>

      <section class="panel" aria-labelledby="notificationsTitle">
        <div class="section-heading row"><div><p class="eyebrow">Audit log</p><h2 id="notificationsTitle">通知・履歴</h2></div><button id="clearLogButton" class="ghost">履歴クリア</button></div>
        <ol id="eventLog" class="event-log" aria-live="polite"></ol>
      </section>
    </main>
    <script src="admin.js" type="module"></script>
  </body>
</html>
